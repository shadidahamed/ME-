<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Futuristic Premium Portfolio - Senior Full Stack Developer & Designer">
    <title>Aether • Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
    <!-- SEO / OG -->
    <meta property="og:title" content="Aether • Portfolio">
    <meta property="og:description" content="Immersive digital experience by a visionary creator.">
    <meta property="og:image" content="assets/images/profile.jpg">
</head>
<body>
    <!-- Custom Cursor -->
    <div id="custom-cursor">
        <div class="cursor-dot"></div>
        <div class="cursor-ring"></div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop preload="auto">
        <source src="assets/music/ambient-chill.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="logo">A</div>
        <nav class="nav-list">
            <button data-page="home" class="nav-btn active" aria-label="Home">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
            <button data-page="about" class="nav-btn" aria-label="About">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button data-page="education" class="nav-btn" aria-label="Education">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </button>
            <button data-page="interests" class="nav-btn" aria-label="Interests">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            </button>
            <button data-page="personal" class="nav-btn" aria-label="Personal Life">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.34a4 4 0 0 1 4 4"/></svg>
            </button>
        </nav>
    </aside>

    <!-- Hamburger -->
    <button id="hamburger" class="hamburger" aria-label="Menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu hidden">
        <div class="mobile-nav">
            <button data-page="home">Home</button>
            <button data-page="about">About</button>
            <button data-page="education">Education</button>
            <button data-page="interests">Interests</button>
            <button data-page="personal">Personal</button>
        </div>
    </div>

    <!-- Pages -->
    <main>
        <!-- HOME -->
        <section id="home" class="page active">
            <div class="hero">
                <div class="profile-float">
                    <div class="profile-glow"></div>
                    <img src="assets/images/profile.jpg" alt="Aether Voss" class="profile-pic" id="profile-pic">
                </div>
                <h1 class="hero-name">AETHER VOSS</h1>
                <p class="hero-tag">Crafting Tomorrow's Realities</p>
                <div class="profession-bg">VISIONARY • CREATOR • TECHNOLOGIST</div>
                
                <div class="social-icons">
                    <!-- Full list of icons with links -->
                    <a href="#" class="social-icon" aria-label="Instagram">📷</a>
                    <a href="#" class="social-icon" aria-label="LinkedIn">💼</a>
                    <a href="#" class="social-icon" aria-label="GitHub">🐙</a>
                    <!-- Add remaining: FB, YT, etc. -->
                </div>

                <div class="home-gallery masonry" id="home-masonry">
                    <!-- JS populated -->
                </div>
            </div>
        </section>

        <!-- ABOUT -->
        <section id="about" class="page">
            <div class="page-header">ABOUT</div>
            <div class="bio-text">
                <p>Multidisciplinary artist and engineer with a passion for immersive interfaces and emotional design.</p>
            </div>
            
            <!-- Orbital Skills -->
            <div class="orbital-skills" id="orbital-container">
                <div class="center-point"></div>
                <!-- JS adds orbiting items -->
            </div>
            
            <div id="skill-detail" class="glass-card hidden">
                <!-- Dynamic -->
            </div>

            <!-- Achievements -->
            <div class="achievements-grid">
                <!-- JS populated certificates -->
            </div>
        </section>

        <!-- EDUCATION, INTERESTS, PERSONAL similar structure with their specific elements -->
        <!-- Full details in CSS/JS below -->
    </main>

    <!-- Lightbox -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">×</span>
            <img id="modal-image" class="modal-media" alt="">
            <video id="modal-video" class="modal-media" controls></video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
